server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /auth/ {
        include uwsgi_params;
        uwsgi_pass unix:/tmp/uwsgi.sock;     # ← напрямую к сокету
    }

    location /admin/ {
        include uwsgi_params;
        uwsgi_pass unix:/tmp/uwsgi.sock;
    }

    location /api/ {
        include uwsgi_params;
        uwsgi_pass unix:/tmp/uwsgi.sock;
    }
}